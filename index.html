<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monopoly Deal</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:#0d3d1a;
  background-image:
    radial-gradient(ellipse at 30% 20%,rgba(255,255,255,0.03) 0%,transparent 50%),
    radial-gradient(ellipse at 70% 80%,rgba(0,0,0,0.2) 0%,transparent 50%),
    repeating-linear-gradient(45deg,rgba(0,0,0,0.015) 0,rgba(0,0,0,0.015) 1px,transparent 1px,transparent 5px),
    repeating-linear-gradient(-45deg,rgba(0,0,0,0.015) 0,rgba(0,0,0,0.015) 1px,transparent 1px,transparent 5px);
  min-height:100vh;
  color:#e8f5e9;
  user-select:none;
}

#app{max-width:740px;margin:0 auto;padding:8px}

/* ── MENU ── */
.menu-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:20px}
.menu-logo{font-size:48px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.5))}
.menu-title{font-size:38px;font-weight:900;letter-spacing:-1px;color:#fff;text-shadow:0 4px 20px rgba(0,0,0,0.6);text-align:center}
.menu-sub{font-size:14px;color:#a5d6a7;text-align:center;max-width:300px;line-height:1.6}
.menu-card{background:rgba(0,0,0,0.35);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:26px 30px;width:100%;max-width:390px;display:flex;flex-direction:column;gap:18px}
.section-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#81c784}
.diff-row{display:flex;gap:8px}
.diff-btn{flex:1;padding:10px 0;border-radius:10px;border:2px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.05);color:#c8e6c9;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s}
.diff-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.2)}
.diff-btn.active.easy{background:#1b5e20;border-color:#66bb6a;color:#fff;box-shadow:0 0 12px rgba(102,187,106,0.3)}
.diff-btn.active.medium{background:#bf360c;border-color:#ff7043;color:#fff;box-shadow:0 0 12px rgba(255,112,67,0.3)}
.diff-btn.active.hard{background:#7f0000;border-color:#ef5350;color:#fff;box-shadow:0 0 12px rgba(239,83,80,0.3)}
.diff-desc{font-size:12px;color:#80cbc4;line-height:1.5;min-height:38px}
.deal-btn{width:100%;padding:15px;border-radius:12px;border:none;background:linear-gradient(135deg,#2e7d32,#1b5e20);color:#fff;font-size:16px;font-weight:800;cursor:pointer;letter-spacing:.5px;box-shadow:0 5px 18px rgba(0,0,0,0.4);transition:all .18s}
.deal-btn:hover{background:linear-gradient(135deg,#388e3c,#2e7d32);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.5)}
.deal-btn:active{transform:translateY(0)}

/* ── HEADER ── */
.g-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding:7px 12px;background:rgba(0,0,0,0.35);border-radius:10px;border:1px solid rgba(255,255,255,0.07)}
.g-title{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px}
.header-r{display:flex;align-items:center;gap:10px}
.diff-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;text-transform:capitalize;letter-spacing:.5px}
.diff-badge.easy{background:#1b5e20;color:#a5d6a7}
.diff-badge.medium{background:#bf360c;color:#ffccbc}
.diff-badge.hard{background:#7f0000;color:#ffcdd2}
.hdr-btn{font-size:11px;padding:4px 11px;border-radius:7px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.07);color:#e8f5e9;cursor:pointer;transition:all .15s}
.hdr-btn:hover{background:rgba(255,255,255,0.14)}

/* ── ZONE ── */
.zone{background:rgba(0,0,0,0.28);border-radius:12px;padding:8px 10px;margin-bottom:6px;border:1px solid rgba(255,255,255,0.07)}
.zone-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px}
.zone-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#80cbc4}
.zone-stats{display:flex;gap:14px;font-size:11px;color:#a5d6a7;align-items:center;flex-wrap:wrap;gap:10px}
.stat{display:flex;align-items:center;gap:4px}
.stat-val{font-weight:800;color:#fff}

/* ── SET PIPS ── */
.set-pips{display:flex;gap:5px;align-items:center}
.pip{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);transition:all .3s}
.pip.filled{background:#66bb6a;border-color:#81c784;box-shadow:0 0 5px rgba(102,187,106,0.6)}

/* ── CARDS ── */
.card{width:74px;min-height:104px;border-radius:8px;display:inline-flex;flex-direction:column;align-items:center;border:2px solid transparent;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;flex-shrink:0;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,0.4)}
.card:hover:not(.disabled){transform:translateY(-6px) scale(1.04);box-shadow:0 10px 24px rgba(0,0,0,0.5);z-index:10}
.card.selected{border-color:#ffd740 !important;box-shadow:0 0 0 2px #ffd740,0 10px 24px rgba(0,0,0,0.5) !important;transform:translateY(-8px) scale(1.04);z-index:20}
.card.disabled{cursor:default}

/* property */
.card.property{background:#fff;color:#212121}
.c-band{width:100%;height:34px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px;font-size:7px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;text-shadow:0 1px 3px rgba(0,0,0,0.35)}
.c-body{padding:5px 4px 4px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;flex:1;width:100%;gap:3px}
.c-name{font-size:8px;font-weight:700;text-align:center;line-height:1.2;color:#1a1a1a}
.c-val{font-size:14px;font-weight:900;color:#1b5e20;line-height:1}

/* money */
.card.money{background:linear-gradient(160deg,#e8f5e9,#c8e6c9);justify-content:center;align-items:center;border-color:rgba(0,128,0,0.15)}
.money-bg{position:absolute;font-size:56px;font-weight:900;color:rgba(27,94,32,0.1);pointer-events:none;line-height:1}
.money-amt{font-size:28px;font-weight:900;color:#1b5e20;z-index:1;line-height:1}
.money-lbl{font-size:8px;font-weight:700;color:#2e7d32;z-index:1;letter-spacing:.5px}

/* action */
.card.action{background:linear-gradient(160deg,#e3f2fd,#bbdefb);justify-content:center;align-items:center;padding:6px;text-align:center}
.c-icon{font-size:22px;margin-bottom:3px;line-height:1}
.c-aname{font-size:8px;font-weight:700;color:#0d47a1;line-height:1.2;text-align:center}
.c-aval{font-size:12px;font-weight:900;color:#1565c0;margin-top:4px}

/* rent */
.card.rent{background:linear-gradient(160deg,#fff9c4,#fff176);justify-content:center;align-items:center;padding:6px;text-align:center}
.c-rname{font-size:7px;font-weight:700;color:#e65100;line-height:1.2}
.c-dots{display:flex;gap:2px;justify-content:center;margin:3px 0}
.c-dot{width:7px;height:7px;border-radius:50%;border:1px solid rgba(0,0,0,0.2)}
.c-rval{font-size:12px;font-weight:900;color:#e65100}

/* facedown */
.card.facedown{background:linear-gradient(135deg,#1a237e,#0d47a1);cursor:default;justify-content:center}
.card.facedown::after{content:'';position:absolute;inset:6px;border:1.5px solid rgba(255,255,255,0.18);border-radius:4px;background:repeating-linear-gradient(45deg,rgba(255,255,255,0.02) 0,rgba(255,255,255,0.02) 2px,transparent 2px,transparent 6px)}

/* small */
.card.sm{width:48px;min-height:66px}
.card.sm .c-band{height:20px;font-size:5.5px}
.card.sm .c-name{font-size:6px}
.card.sm .c-val{font-size:10px}
.card.sm .money-amt{font-size:17px}
.card.sm .c-aname{font-size:6px}
.card.sm .c-icon{font-size:13px}

/* ── CARD ROW ── */
.card-row{display:flex;flex-wrap:wrap;gap:6px;align-items:flex-end}
.card-slot{position:relative}
.card-tag{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:6px;font-weight:700;z-index:5;pointer-events:none}

/* ── PROPERTY SETS ── */
.sets-wrap{display:flex;flex-wrap:nowrap;gap:10px;overflow-x:auto;padding-bottom:3px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.2) transparent}
.sets-wrap::-webkit-scrollbar{height:3px}
.sets-wrap::-webkit-scrollbar-track{background:transparent}
.sets-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}
.p-set{display:flex;flex-direction:column;gap:3px}
.set-lbl{font-size:8px;color:rgba(255,255,255,0.55);display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.set-done{background:#ffd740;color:#000;font-size:7px;font-weight:800;padding:1px 5px;border-radius:3px;letter-spacing:.3px}
.set-cards{display:flex;gap:3px}

/* ── MIDDLE ROW ── */
.mid-row{display:flex;gap:8px;margin-bottom:6px}
.deck-box{width:60px;background:linear-gradient(135deg,#1a237e,#0d47a1);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.12);flex-shrink:0;padding:6px 0;box-shadow:0 3px 10px rgba(0,0,0,0.4)}
.deck-num{font-size:22px;font-weight:900;color:#fff;line-height:1}
.deck-lbl{font-size:8px;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.log-box{flex:1;background:rgba(0,0,0,0.3);border-radius:10px;padding:8px 12px;border:1px solid rgba(255,255,255,0.06);font-size:12px;color:#e8f5e9;line-height:1.5;display:flex;align-items:center;min-height:40px}

/* ── TURN BAR ── */
.turn-bar{display:flex;align-items:center;gap:10px;margin-bottom:6px;padding:7px 12px;border-radius:9px;font-size:13px;font-weight:600;flex-wrap:wrap}
.turn-bar.pturn{background:rgba(46,125,50,.25);border:1px solid rgba(102,187,106,.25);color:#a5d6a7}
.turn-bar.aiturn{background:rgba(183,28,28,.18);border:1px solid rgba(239,83,80,.2);color:#ef9a9a}
.turn-bar.discard{background:rgba(230,81,0,.2);border:1px solid rgba(255,183,77,.25);color:#ffcc80}
.play-pips{display:flex;gap:4px}
.ppip{width:11px;height:11px;border-radius:50%;transition:all .25s}
.ppip.avail{background:#66bb6a;box-shadow:0 0 5px rgba(102,187,106,.6)}
.ppip.used{background:rgba(255,255,255,.15)}
.dbl-badge{background:#e65100;color:#fff;font-size:10px;font-weight:800;padding:3px 9px;border-radius:6px;animation:pulse 1s infinite;letter-spacing:.4px}

/* ── ACTION PANELS ── */
.apanel{border-radius:11px;padding:10px 12px;margin-bottom:6px;border:1px solid transparent}
.apanel.rent{background:rgba(21,101,192,.2);border-color:rgba(144,202,249,.25)}
.apanel.target{background:rgba(183,28,28,.2);border-color:rgba(239,154,154,.25)}
.apanel.jsn{background:rgba(183,28,28,.25);border-color:rgba(239,83,80,.4)}
.apanel.discard{background:rgba(230,81,0,.18);border-color:rgba(255,183,77,.25)}
.panel-title{font-size:13px;font-weight:700;margin-bottom:10px;color:#fff}
.panel-sub{font-size:12px;color:#ffcdd2;margin-bottom:12px;line-height:1.4}
.col-choices{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.col-btn{padding:7px 13px;border-radius:8px;border:2px solid rgba(255,255,255,.2);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.2px}
.col-btn:hover{transform:scale(1.06);filter:brightness(1.12)}
.col-btn:disabled{opacity:.3;cursor:default;transform:none}

/* ── BUTTONS ── */
.btn{padding:7px 15px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.2px}
.btn:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px)}
.btn:active:not(:disabled){transform:translateY(0)}
.btn:disabled{opacity:.4;cursor:default;transform:none;filter:none}
.btn.pri{background:#1565c0;color:#fff}
.btn.suc{background:#2e7d32;color:#fff}
.btn.dng{background:#c62828;color:#fff}
.btn.wrn{background:#e65100;color:#fff}
.btn.sec{background:rgba(255,255,255,.1);color:#e8f5e9;border:1px solid rgba(255,255,255,.14)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* ── HAND HEADER ── */
.hand-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:6px}
.hand-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#80cbc4}
.sel-hint{margin-top:8px;font-size:11px;color:rgba(255,255,255,.5)}
.sel-hint strong{color:#ffd740}

/* ── GAME OVER ── */
.go-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:18px;text-align:center}
.go-emoji{font-size:76px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.5))}
.go-title{font-size:38px;font-weight:900;color:#fff}
.go-sub{font-size:15px;color:#a5d6a7;max-width:300px;line-height:1.6}

/* ── MISC ── */
.thinking{display:inline-flex;gap:4px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:#ef9a9a;animation:pulse 1s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
.empty-hint{font-size:12px;color:rgba(255,255,255,.35);font-style:italic}

@keyframes pulse{0%,100%{opacity:.25}50%{opacity:1}}

@keyframes cardEnter{
  0%  {transform:translateY(-28px) scale(0.6);opacity:0}
  55% {transform:translateY(5px) scale(1.07);opacity:1}
  78% {transform:translateY(-3px) scale(0.97)}
  100%{transform:translateY(0) scale(1);opacity:1}
}
.card-enter{animation:cardEnter 0.35s cubic-bezier(0.34,1.56,0.64,1) both}

/* ── AI card reveal (flip from facedown) ── */
@keyframes cardReveal{
  0%  {transform:rotateY(90deg) scale(0.8);opacity:0}
  60% {transform:rotateY(-5deg) scale(1.06);opacity:1}
  100%{transform:rotateY(0deg) scale(1);opacity:1}
}
.card-reveal{animation:cardReveal 0.5s cubic-bezier(0.34,1.56,0.64,1) both}

/* ── Targeted card (about to be stolen) ── */
@keyframes cardTargeted{
  0%,100%{transform:scale(1);box-shadow:0 3px 10px rgba(0,0,0,0.4)}
  40%,60%{transform:translateY(-5px) scale(1.09);box-shadow:0 0 0 3px #ef5350,0 10px 22px rgba(239,83,80,0.55)}
}
.card-targeted{animation:cardTargeted 0.6s ease-in-out 2;border-color:#ef5350 !important;z-index:10;position:relative}

/* ── Play toast ── */
#play-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:900;pointer-events:none}
.toast-inner{display:flex;flex-direction:column;align-items:center;gap:8px;background:rgba(8,18,12,0.93);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.15);border-radius:14px;padding:12px 20px;min-width:120px}
.toast-actor{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}
.toast-desc{font-size:11px;font-weight:600;color:#e8f5e9;text-align:center;line-height:1.4;margin-top:2px;max-width:160px}
@keyframes toastSlide{
  0%  {opacity:0;transform:translateY(18px) scale(0.88)}
  18% {opacity:1;transform:translateY(-3px) scale(1.03)}
  30% {transform:translateY(0) scale(1)}
  70% {opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-8px) scale(0.95)}
}
.toast-show{animation:toastSlide 1.8s ease-in-out both}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── Constants ───────────────────────────────────────────────────────────────

const COLORS = {
  brown:    { label:'Brown',       bg:'#5D4037', text:'#fff', size:2 },
  lightblue:{ label:'Light Blue',  bg:'#039BE5', text:'#fff', size:3 },
  pink:     { label:'Pink',        bg:'#E91E63', text:'#fff', size:3 },
  orange:   { label:'Orange',      bg:'#EF6C00', text:'#fff', size:3 },
  red:      { label:'Red',         bg:'#C62828', text:'#fff', size:3 },
  yellow:   { label:'Yellow',      bg:'#F9A825', text:'#000', size:3 },
  green:    { label:'Green',       bg:'#2E7D32', text:'#fff', size:3 },
  darkblue: { label:'Dark Blue',   bg:'#1565C0', text:'#fff', size:2 },
  railroad: { label:'Railroad',    bg:'#37474F', text:'#fff', size:4 },
  utility:  { label:'Utility',     bg:'#558B2F', text:'#fff', size:2 },
};

const RENT = {
  brown:[1,2], lightblue:[1,2,3], pink:[1,2,4], orange:[1,3,5],
  red:[2,3,6], yellow:[2,4,6], green:[2,4,7], darkblue:[3,8],
  railroad:[1,2,3,4], utility:[1,2],
};

const ACTION_ICONS = {
  passgo:'▶', dealbreaker:'💰', slydeal:'🦊', forceddeal:'🔄',
  debtcollector:'💸', birthday:'🎂', jsn:'🚫', doublerent:'✕2',
  house:'🏠', hotel:'🏨', rent:'💵',
};

// ─── State ────────────────────────────────────────────────────────────────────

let S = {
  screen:'menu', difficulty:'medium',
  deck:[], playerHand:[], aiHand:[],
  playerBank:[], aiBank:[],
  playerSets:{}, aiSets:{},
  turn:'player', playsLeft:3, mustDraw:true,
  log:[], gameOver:null, selected:null,
  pendingAction:null, aiThinking:false,
  doubleActive:false, discardMode:false,
  discardSelected:[], jsnPrompt:null,
  jsnChallenge:null, lastAction:null,
};

// ─── Pure helpers ─────────────────────────────────────────────────────────────

function buildDeck() {
  const c=[];let id=0;
  const prop=(color,name,val)=>({id:id++,type:'property',color,name,value:val});
  const money=(val)=>({id:id++,type:'money',value:val,name:`$${val}M`});
  const action=(name,val,subtype,extra={})=>({id:id++,type:'action',name,value:val,subtype,...extra});
  const rent=(colors,val)=>({id:id++,type:'rent',colors,value:val,subtype:'rent',
    name:colors.length===2?`Rent (${colors.map(x=>COLORS[x].label).join('/')})`: 'Wild Rent'});

  c.push(prop('brown','Mediterranean',1),prop('brown','Baltic Ave',1));
  c.push(prop('lightblue','Oriental Ave',1),prop('lightblue','Vermont Ave',1),prop('lightblue','Connecticut Ave',2));
  c.push(prop('pink','St. Charles',2),prop('pink','States Ave',2),prop('pink','Virginia Ave',2));
  c.push(prop('orange','St. James',2),prop('orange','Tennessee Ave',2),prop('orange','New York Ave',2));
  c.push(prop('red','Kentucky Ave',3),prop('red','Indiana Ave',3),prop('red','Illinois Ave',3));
  c.push(prop('yellow','Atlantic Ave',3),prop('yellow','Ventnor Ave',3),prop('yellow','Marvin Gardens',3));
  c.push(prop('green','Pacific Ave',4),prop('green','North Carolina',4),prop('green','Pennsylvania Ave',4));
  c.push(prop('darkblue','Park Place',4),prop('darkblue','Boardwalk',4));
  c.push(prop('railroad','Reading RR',2),prop('railroad','Pennsylvania RR',2),prop('railroad','B&O RR',2),prop('railroad','Short Line RR',2));
  c.push(prop('utility','Electric Co.',2),prop('utility','Water Works',2));
  [1,1,1,2,2,3,3,4,4,5].forEach(v=>c.push(money(v)));
  [10,10,10,10].forEach(v=>c.push(money(v)));
  for(let i=0;i<10;i++) c.push(action('Pass Go',1,'passgo'));
  for(let i=0;i<3;i++) c.push(action('Deal Breaker',5,'dealbreaker'));
  for(let i=0;i<3;i++) c.push(action('Sly Deal',3,'slydeal'));
  for(let i=0;i<4;i++) c.push(action('Forced Deal',3,'forceddeal'));
  for(let i=0;i<3;i++) c.push(action('Debt Collector',3,'debtcollector',{amount:5}));
  for(let i=0;i<3;i++) c.push(action("It's My Birthday",2,'birthday',{amount:2}));
  for(let i=0;i<3;i++) c.push(action('Just Say No!',4,'jsn'));
  for(let i=0;i<3;i++) c.push(action('Double the Rent',1,'doublerent'));
  for(let i=0;i<2;i++) c.push(action('House',3,'house'));
  for(let i=0;i<2;i++) c.push(action('Hotel',4,'hotel'));
  c.push(rent(['brown','lightblue'],1)); c.push(rent(['pink','orange'],1));
  c.push(rent(['red','yellow'],1)); c.push(rent(['green','darkblue'],1));
  c.push(rent(['railroad','utility'],1));
  for(let i=0;i<3;i++) c.push(rent(Object.keys(COLORS),3));
  return c;
}

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

const isComplete=(sets,color)=>sets[color]&&sets[color].length>=COLORS[color].size;
const countComplete=sets=>Object.keys(COLORS).filter(c=>isComplete(sets,c)).length;
function calcRent(sets,color,doubled,houses={},hotels={}) {
  const cnt=(sets[color]||[]).length;
  const arr=RENT[color];
  if(!arr||cnt===0)return 0;
  const base=arr[Math.min(cnt-1,arr.length-1)]||0;
  const extras=(houses[color]?3:0)+(hotels[color]?4:0);
  return doubled?(base+extras)*2:base+extras;
}
const bankValue=bank=>bank.reduce((s,c)=>s+c.value,0);

// IDs of cards to animate on the next render; callers set this, then clear after render()
let _animIds = new Set();
// IDs of cards to highlight as steal targets on the next render
let _targetedIds = new Set();
let _toastTimer = null;

function showPlayToast(actor, card, desc) {
  const el = document.getElementById('play-toast');
  if (!el) return;
  if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }
  const actorColor = actor === 'You' ? '#a5d6a7' : '#ef9a9a';
  el.innerHTML = `<div class="toast-inner toast-show">
    <div class="toast-actor" style="color:${actorColor}">${actor} played</div>
    ${renderCard(card, {disabled:true, reveal:true})}
    ${desc ? `<div class="toast-desc">${desc}</div>` : ''}
  </div>`;
  _toastTimer = setTimeout(() => { el.innerHTML = ''; _toastTimer = null; }, 1900);
}

function renderCard(card, {selected=false,disabled=false,small=false,onclick='',reveal=false}={}) {
  const cls=['card'];
  if(small) cls.push('sm');
  if(selected) cls.push('selected');
  if(disabled) cls.push('disabled');
  if(_animIds.has(card.id)) cls.push('card-enter');
  if(_targetedIds.has(card.id)) cls.push('card-targeted');
  if(reveal) cls.push('card-reveal');
  const click=onclick&&!disabled?`onclick="${onclick}"`:'';

  if(card.type==='property'){
    const col=COLORS[card.color];
    cls.push('property');
    return `<div class="${cls.join(' ')}" ${click}>
      <div class="c-band" style="background:${col.bg};color:${col.text}">${col.label}</div>
      <div class="c-body"><div class="c-name">${card.name}</div><div class="c-val">$${card.value}M</div></div>
    </div>`;
  }
  if(card.type==='money'){
    cls.push('money');
    return `<div class="${cls.join(' ')}" ${click}>
      <div class="money-bg">$</div>
      <div class="money-amt">${card.value}</div>
      <div class="money-lbl">MILLION</div>
    </div>`;
  }
  if(card.type==='action'){
    cls.push('action');
    return `<div class="${cls.join(' ')}" ${click}>
      <div class="c-icon">${ACTION_ICONS[card.subtype]||'★'}</div>
      <div class="c-aname">${card.name}</div>
      <div class="c-aval">$${card.value}M</div>
    </div>`;
  }
  if(card.type==='rent'){
    cls.push('rent');
    const dots=(card.colors.length<=5?card.colors:[]).map(c=>
      `<div class="c-dot" style="background:${COLORS[c]?.bg||'#ccc'}"></div>`).join('');
    return `<div class="${cls.join(' ')}" ${click}>
      <div class="c-icon">💵</div>
      <div class="c-rname">${card.name}</div>
      <div class="c-dots">${dots}</div>
      <div class="c-rval">$${card.value}M</div>
    </div>`;
  }
  return '';
}

function fd(small=false){
  return `<div class="card facedown${small?' sm':''}"></div>`;
}

function renderSets(sets,small=true,houses={},hotels={}){
  const cols=Object.keys(sets).filter(c=>(sets[c]||[]).length>0);
  if(!cols.length) return '<span class="empty-hint">No properties yet</span>';
  return `<div class="sets-wrap">${cols.map(color=>{
    const cards=sets[color], done=isComplete(sets,color);
    const hasHouse=houses[color], hasHotel=hotels[color];
    const rentAmt=calcRent(sets,color,false,houses,hotels);
    const markers=(hasHotel?'🏨':(hasHouse?'🏠':''));
    return `<div class="p-set">
      <div class="set-lbl">
        ${COLORS[color].label} ${cards.length}/${COLORS[color].size}
        ${done?`<span class="set-done">COMPLETE</span>`:''}
        ${markers?`<span style="font-size:11px">${markers}</span>`:''}
        ${done?`<span style="font-size:9px;color:rgba(255,255,255,.45)">rent $${rentAmt}M</span>`:''}
      </div>
      <div class="set-cards">${cards.map(c=>renderCard(c,{small,disabled:true})).join('')}</div>
    </div>`;
  }).join('')}</div>`;
}

function pips(sets){
  const n=countComplete(sets);
  return `<div class="set-pips">${[0,1,2].map(i=>`<div class="pip${i<n?' filled':''}"></div>`).join('')}</div>`;
}

function checkWin(sets,who){
  if(countComplete(sets)>=3){ S.gameOver=who; if(_isMulti)pushState(); render(); return true; }
  return false;
}

function initGame(){
  const d=shuffle(buildDeck());
  Object.assign(S,{
    deck:d.slice(10), playerHand:d.slice(0,5), aiHand:d.slice(5,10),
    playerBank:[], aiBank:[], playerSets:{}, aiSets:{},
    turn:'player', playsLeft:3, mustDraw:true, aiThinking:false,
    log:[_isMulti?'Game started! Host draws 2 cards to begin.':'Game started! Draw 2 cards to begin your turn.'],
    gameOver:null, selected:null, pendingAction:null,
    doubleActive:false, discardMode:false, discardSelected:[], jsnPrompt:null,
    jsnChallenge:null, lastAction:null,
    playerHouses:{}, playerHotels:{}, aiHouses:{}, aiHotels:{},
    discard:[], screen:'game', multiLobby:null,
  });
  if (_isMulti) { pushState(); }
  render();
}

function payRent(amount, payerBank, payerSets){
  let rem=amount;
  const newBank=[...payerBank];
  const newSets=JSON.parse(JSON.stringify(payerSets));
  const paid=[];
  [...newBank].sort((a,b)=>b.value-a.value).forEach(card=>{
    if(rem<=0)return;
    paid.push(card); rem-=card.value;
    newBank.splice(newBank.findIndex(c=>c.id===card.id),1);
  });
  if(rem>0){
    for(const color of Object.keys(newSets)){
      if(rem<=0)break;
      while(newSets[color]?.length>0&&rem>0){
        const card=newSets[color].pop(); paid.push(card); rem-=card.value;
      }
    }
  }
  return {newBank,newSets,paid};
}

// Route paid cards to the receiver: money → bank, properties → board
function applyPayment(paid, receiverBank, receiverSets){
  const newBank=[...receiverBank];
  const newSets=JSON.parse(JSON.stringify(receiverSets));
  for(const card of paid){
    if(card.type==='property'){
      if(!newSets[card.color])newSets[card.color]=[];
      newSets[card.color].push(card);
    } else {
      newBank.push(card);
    }
  }
  return {newBank,newSets};
}

// Subtypes that get reshuffled back when the deck runs out
const RESHUFFLE=['rent','passgo','slydeal','forceddeal','jsn'];

function discardCard(card){
  if(RESHUFFLE.includes(card.subtype)) S.discard.push(card);
}

function tryReshuffle(){
  const candidates=S.discard.filter(c=>RESHUFFLE.includes(c.subtype));
  if(!candidates.length)return;
  S.discard=S.discard.filter(c=>!RESHUFFLE.includes(c.subtype));
  S.deck=[...S.deck,...shuffle(candidates)];
  addLog(`Deck empty — ${candidates.length} action card${candidates.length!==1?'s':''} reshuffled back in.`);
}

// Draw n cards, reshuffling action cards back in if needed
function drawFromDeck(n){
  if(S.deck.length<n) tryReshuffle();
  const drawn=S.deck.slice(0,Math.min(n,S.deck.length));
  S.deck=S.deck.slice(drawn.length);
  return drawn;
}

function switchToAI(){
  S.turn='ai'; S.doubleActive=false;
  if(_isMulti){
    S.aiThinking=false; S.mustDraw=true; S.playsLeft=3;
    addLog("Opponent's turn.");
    pushState(); render(); return;
  }
  S.aiThinking=true;
  addLog('AI is thinking...');
  render();
  setTimeout(runAiTurn,1000);
}

function finishPlayerTurn(){
  S.selected=null; S.pendingAction=null; S.doubleActive=false; S.playsLeft=0;
  if(S.playerHand.length>7){
    S.discardMode=true; S.discardSelected=[];
    addLog(`You have ${S.playerHand.length} cards — discard ${S.playerHand.length-7} to get to 7.`);
    render();
  } else {
    switchToAI();
  }
}

function playerDraw(){
  if(S.turn!=='player'||S.discardMode||!S.mustDraw)return;
  const drawn=drawFromDeck(2);
  S.playerHand=[...S.playerHand,...drawn];
  S.mustDraw=false;
  addLog(`You drew ${drawn.length} card${drawn.length!==1?'s':''}. Play up to 3 cards or end your turn.`);
  _animIds=new Set(drawn.map(c=>c.id));
  if(_isMulti) pushState();
  render();
  _animIds.clear();
}

function endTurn(){
  if(S.turn!=='player'||S.discardMode||S.mustDraw)return;
  S.selected=null; S.pendingAction=null;
  finishPlayerTurn();
}

function toggleDiscard(id){
  S.discardSelected=S.discardSelected.includes(id)
    ?S.discardSelected.filter(x=>x!==id)
    :[...S.discardSelected,id];
  render();
}

function confirmDiscard(){
  const needed=S.playerHand.length-7;
  if(S.discardSelected.length!==needed)return;
  S.playerHand=S.playerHand.filter(c=>!S.discardSelected.includes(c.id));
  S.discardMode=false; S.discardSelected=[];
  addLog('Cards discarded.');
  switchToAI();
}

function cardClick(id){
  if(S.turn!=='player'||S.playsLeft<=0||S.discardMode||S.mustDraw||S.jsnPrompt||S.jsnChallenge)return;
  const card=S.playerHand.find(c=>c.id===id);
  if(!card||card.subtype==='jsn')return;
  S.selected=S.selected?.id===id?null:card;
  render();
}

function clearSel(){ S.selected=null; render(); }
function cancelAction(){ S.pendingAction=null; render(); }

function playSelected(mode){
  const {selected,playerHand,aiBank,aiSets,playerSets,deck}=S;
  if(!selected||S.turn!=='player'||S.playsLeft<=0)return;
  const card=selected;
  S.selected=null;

  if(card.type==='money'||mode==='bank'){
    if(card.type==='property'){ addLog("Properties can't be banked."); render(); return; }
    S.playerHand=playerHand.filter(c=>c.id!==card.id);
    S.playerBank=[...S.playerBank,card]; S.playsLeft--;
    addLog(`You banked ${card.name} ($${card.value}M).`);
    S.lastAction={card, desc:`$${card.value}M to bank`};
    _animIds=new Set([card.id]);
    if(S.playsLeft<=0)finishPlayerTurn(); else { pushState(); render(); }
    _animIds.clear();
    return;
  }

  if(card.type==='property'){
    S.playerHand=playerHand.filter(c=>c.id!==card.id);
    const ns={...playerSets,[card.color]:[...(playerSets[card.color]||[]),card]};
    S.playerSets=ns; S.playsLeft--;
    addLog(`You played ${card.name} to ${COLORS[card.color].label}.`);
    showPlayToast('You', card, COLORS[card.color].label);
    S.lastAction={card, desc:`→ ${COLORS[card.color].label}`};
    _animIds=new Set([card.id]);
    if(checkWin(ns,'player'))return;
    if(S.playsLeft<=0)finishPlayerTurn(); else { pushState(); render(); }
    _animIds.clear();
    return;
  }

  if(card.type==='action'||card.type==='rent'){
    if(card.subtype==='passgo'){
      discardCard(card);
      const drawn=drawFromDeck(2);
      S.playerHand=[...playerHand.filter(c=>c.id!==card.id),...drawn];
      S.playsLeft--;
      addLog('You played Pass Go and drew 2 cards!');
      showPlayToast('You', card, 'Draw 2 cards!');
      S.lastAction={card, desc:'Drew 2 cards'};
      _animIds=new Set(drawn.map(c=>c.id));
      if(S.playsLeft<=0)finishPlayerTurn(); else { pushState(); render(); }
      _animIds.clear();
      return;
    }
    if(card.subtype==='birthday'){
      const amt=card.amount||2;
      S.playerHand=playerHand.filter(c=>c.id!==card.id);
      S.playsLeft--;
      discardCard(card);
      addLog(`It's My Birthday! Opponent must pay $${amt}M.`);
      showPlayToast('You', card, `Opponent pays $${amt}M`);
      S.lastAction={card, desc:`Opponent pays $${amt}M`};
      aiMayJsn(`Birthday ($${amt}M)`, ()=>{
        const {newBank,newSets,paid}=payRent(amt,S.aiBank,S.aiSets);
        S.aiBank=newBank; S.aiSets=newSets;
        const r=applyPayment(paid,S.playerBank,S.playerSets);
        S.playerBank=r.newBank; S.playerSets=r.newSets;
        addLog(`Collected $${paid}M birthday payment.`);
        if(_isMulti){ S.lastAction={card, desc:`Paid $${paid}M`}; pushState(); if(S.playsLeft<=0)finishPlayerTurn(); else render(); }
      });
      if(!S.jsnChallenge){ if(S.playsLeft<=0)finishPlayerTurn(); else render(); }
      return;
    }
    if(card.subtype==='debtcollector'){
      const amt=card.amount||5;
      S.playerHand=playerHand.filter(c=>c.id!==card.id);
      S.playsLeft--;
      discardCard(card);
      addLog(`Debt Collector! Opponent must pay $${amt}M.`);
      showPlayToast('You', card, `Opponent pays $${amt}M`);
      S.lastAction={card, desc:`Opponent pays $${amt}M`};
      aiMayJsn(`Debt Collector ($${amt}M)`, ()=>{
        const {newBank,newSets,paid}=payRent(amt,S.aiBank,S.aiSets);
        S.aiBank=newBank; S.aiSets=newSets;
        const r=applyPayment(paid,S.playerBank,S.playerSets);
        S.playerBank=r.newBank; S.playerSets=r.newSets;
        addLog(`Collected $${paid}M debt.`);
        if(_isMulti){ S.lastAction={card, desc:`Paid $${paid}M`}; pushState(); if(S.playsLeft<=0)finishPlayerTurn(); else render(); }
      });
      if(!S.jsnChallenge){ if(S.playsLeft<=0)finishPlayerTurn(); else render(); }
      return;
    }
    if(card.subtype==='doublerent'){
      S.playerHand=playerHand.filter(c=>c.id!==card.id);
      S.doubleActive=true; S.playsLeft--;
      addLog('Double the Rent is active!');
      showPlayToast('You', card, 'Next rent is DOUBLED!');
      S.lastAction={card, desc:'Next rent is DOUBLED!'};
      _animIds=new Set([card.id]);
      if(S.playsLeft<=0)finishPlayerTurn(); else { pushState(); render(); }
      _animIds.clear();
      return;
    }
    if(card.subtype==='rent'){ S.pendingAction={card,step:'chooseColor'}; render(); return; }
    if(['dealbreaker','slydeal','forceddeal'].includes(card.subtype)){
      S.pendingAction={card,step:'chooseTarget'}; render(); return;
    }
    if(card.subtype==='house'){
      // Must have a complete set without a house; otherwise bank it
      const canPlace=Object.keys(S.playerSets).some(c=>isComplete(S.playerSets,c)&&!S.playerHouses[c]);
      if(canPlace){ S.pendingAction={card,step:'placeHouse'}; render(); return; }
    }
    if(card.subtype==='hotel'){
      // Must have a complete set with a house but no hotel; otherwise bank it
      const canPlace=Object.keys(S.playerSets).some(c=>isComplete(S.playerSets,c)&&S.playerHouses[c]&&!S.playerHotels[c]);
      if(canPlace){ S.pendingAction={card,step:'placeHotel'}; render(); return; }
    }
    // bank anything else (or house/hotel when no eligible set)
    S.playerHand=playerHand.filter(c=>c.id!==card.id);
    S.playerBank=[...S.playerBank,card]; S.playsLeft--;
    addLog(`You banked ${card.name}.`);
    S.lastAction={card, desc:`$${card.value}M to bank`};
    _animIds=new Set([card.id]);
    if(S.playsLeft<=0)finishPlayerTurn(); else { pushState(); render(); }
    _animIds.clear();
  }
}

function placeHouse(color){
  if(!S.pendingAction||S.pendingAction.step!=='placeHouse')return;
  const card=S.pendingAction.card;
  S.playerHand=S.playerHand.filter(c=>c.id!==card.id);
  S.playerHouses={...S.playerHouses,[color]:true};
  S.playsLeft--; S.pendingAction=null;
  addLog(`You placed a House on your ${COLORS[color].label} set! Rent +$3M`);
  S.lastAction={card, desc:`House on ${COLORS[color].label}`};
  if(S.playsLeft<=0)finishPlayerTurn(); else { pushState(); render(); }
}

function placeHotel(color){
  if(!S.pendingAction||S.pendingAction.step!=='placeHotel')return;
  const card=S.pendingAction.card;
  S.playerHand=S.playerHand.filter(c=>c.id!==card.id);
  S.playerHotels={...S.playerHotels,[color]:true};
  S.playsLeft--; S.pendingAction=null;
  addLog(`You placed a Hotel on your ${COLORS[color].label} set! Rent +$4M`);
  S.lastAction={card, desc:`Hotel on ${COLORS[color].label}`};
  if(S.playsLeft<=0)finishPlayerTurn(); else { pushState(); render(); }
}

function chooseColor(color){
  if(!S.pendingAction)return;
  const card=S.pendingAction.card;
  const amt=calcRent(S.playerSets,color,S.doubleActive,S.playerHouses,S.playerHotels);
  addLog(`You charged rent for ${COLORS[color].label}: $${amt}M!${S.doubleActive?' (Doubled!)':''}`);
  showPlayToast('You', card, `$${amt}M rent for ${COLORS[color].label}${S.doubleActive?' (Doubled!)':''}`);
  discardCard(card);
  S.playerHand=S.playerHand.filter(c=>c.id!==card.id);
  const wasDouble=S.doubleActive;
  S.doubleActive=false;
  S.playsLeft--; S.pendingAction=null;
  S.lastAction={card, desc:`$${amt}M rent — ${COLORS[color].label}${wasDouble?' (Doubled!)':''}`};
  aiMayJsn(`rent $${amt}M for ${COLORS[color].label}`, ()=>{
    const {newBank,newSets,paid}=payRent(amt,S.aiBank,S.aiSets);
    S.aiBank=newBank; S.aiSets=newSets;
    const r=applyPayment(paid,S.playerBank,S.playerSets);
    S.playerBank=r.newBank; S.playerSets=r.newSets;
    addLog(`Collected $${paid}M rent.`);
    if(_isMulti){ S.lastAction={card, desc:`Paid $${paid}M rent`}; pushState(); if(S.playsLeft<=0)finishPlayerTurn(); else render(); }
  });
  if(!S.jsnChallenge){ if(S.playsLeft<=0)finishPlayerTurn(); else render(); }
}

function chooseTarget(color){
  if(!S.pendingAction)return;
  const card=S.pendingAction.card;
  discardCard(card);
  S.playerHand=S.playerHand.filter(c=>c.id!==card.id);

  if(card.subtype==='dealbreaker'){
    if(!isComplete(S.aiSets,color)){ addLog("That set isn't complete!"); render(); return; }
    S.playsLeft--; S.pendingAction=null;
    addLog(`Deal Breaker targeting opponent's ${COLORS[color].label} set!`);
    _targetedIds=new Set((S.aiSets[color]||[]).map(c=>c.id));
    showPlayToast('You', card, `DEAL BREAKER on ${COLORS[color].label}!`);
    S.lastAction={card, desc:`DEAL BREAKER on ${COLORS[color].label}!`};
    setTimeout(()=>{ _targetedIds.clear(); },1200);
    let won=false;
    aiMayJsn(`Deal Breaker on your ${COLORS[color].label} set`, ()=>{
      const stolen=S.aiSets[color]||[];
      const newAi={...S.aiSets}; delete newAi[color]; S.aiSets=newAi;
      const ns={...S.playerSets,[color]:stolen}; S.playerSets=ns;
      if(S.aiHouses[color]){ S.playerHouses={...S.playerHouses,[color]:true}; const h={...S.aiHouses}; delete h[color]; S.aiHouses=h; }
      if(S.aiHotels[color]){ S.playerHotels={...S.playerHotels,[color]:true}; const h={...S.aiHotels}; delete h[color]; S.aiHotels=h; }
      addLog(`DEAL BREAKER! You stole the complete ${COLORS[color].label} set!`);
      won=checkWin(ns,'player');
      if(_isMulti){ if(!won){ S.lastAction={card, desc:`Stole ${COLORS[color].label} set!`}; pushState(); if(S.playsLeft<=0)finishPlayerTurn(); else render(); } }
    });
    if(won)return;
    if(!S.jsnChallenge){ if(S.playsLeft<=0)finishPlayerTurn(); else render(); }
    return;
  }
  if(card.subtype==='slydeal'){
    const cc=S.aiSets[color]||[];
    if(!cc.length){ addLog("Opponent has nothing there!"); render(); return; }
    const stolen=cc[cc.length-1];
    S.playsLeft--; S.pendingAction=null;
    addLog(`Sly Deal targeting opponent's ${stolen.name}!`);
    _targetedIds=new Set([stolen.id]);
    showPlayToast('You', card, `Stealing ${stolen.name}!`);
    S.lastAction={card, desc:`Stealing ${stolen.name}!`};
    setTimeout(()=>{ _targetedIds.clear(); },1200);
    let won=false;
    aiMayJsn(`Sly Deal on your ${stolen.name}`, ()=>{
      S.aiSets={...S.aiSets,[color]:cc.slice(0,-1)};
      const ns={...S.playerSets,[stolen.color]:[...(S.playerSets[stolen.color]||[]),stolen]};
      S.playerSets=ns;
      addLog(`SLY DEAL! You stole ${stolen.name}!`);
      won=checkWin(ns,'player');
      if(_isMulti){ if(!won){ S.lastAction={card, desc:`Stole ${stolen.name}!`}; pushState(); if(S.playsLeft<=0)finishPlayerTurn(); else render(); } }
    });
    if(won)return;
    if(!S.jsnChallenge){ if(S.playsLeft<=0)finishPlayerTurn(); else render(); }
  }
  if(card.subtype==='forceddeal'){
    const cc=S.aiSets[color]||[];
    if(!cc.length||isComplete(S.aiSets,color)){ addLog("Can't take from a complete set!"); render(); return; }
    const aiCard=cc[cc.length-1];
    // Move to step 2: player picks which of their properties to give
    S.pendingAction={card, step:'chooseGive', aiColor:color, aiCard};
    render();
  }
}

function chooseGive(cardId){
  if(!S.pendingAction||S.pendingAction.step!=='chooseGive')return;
  const {card, aiColor, aiCard}=S.pendingAction;

  // Find the player's card and which color set it's in
  let giveColor=null, giveIdx=-1;
  for(const [col, cards] of Object.entries(S.playerSets)){
    const idx=cards.findIndex(c=>c.id===cardId);
    if(idx!==-1){ giveColor=col; giveIdx=idx; break; }
  }
  if(giveColor===null){ render(); return; }

  const giveCard=S.playerSets[giveColor][giveIdx];
  S.playerHand=S.playerHand.filter(c=>c.id!==card.id);
  S.playsLeft--; S.pendingAction=null;
  addLog(`Forced Deal: swapping your ${giveCard.name} for AI's ${aiCard.name}!`);
  showPlayToast('You', card, `${giveCard.name} ↔ ${aiCard.name}`);

  S.lastAction={card, desc:`${giveCard.name} ↔ ${aiCard.name}`};
  let won=false;
  aiMayJsn(`Forced Deal — swapping your ${aiCard.name} for ${giveCard.name}`, ()=>{
    const newPS=JSON.parse(JSON.stringify(S.playerSets));
    newPS[giveColor].splice(giveIdx,1);
    if(!newPS[giveColor].length) delete newPS[giveColor];

    const newAS=JSON.parse(JSON.stringify(S.aiSets));
    newAS[aiColor]=newAS[aiColor].filter(c=>c.id!==aiCard.id);
    if(!newAS[aiColor].length) delete newAS[aiColor];

    if(!newAS[giveCard.color])newAS[giveCard.color]=[];
    newAS[giveCard.color].push(giveCard);
    if(!newPS[aiCard.color])newPS[aiCard.color]=[];
    newPS[aiCard.color].push(aiCard);

    S.playerSets=newPS; S.aiSets=newAS;
    addLog(`Swap complete! You got ${aiCard.name}, opponent got ${giveCard.name}.`);
    won=checkWin(newPS,'player');
    if(!won) checkWin(newAS,'ai');
    if(_isMulti && !won){ S.lastAction={card, desc:`Swapped ${giveCard.name} ↔ ${aiCard.name}`}; pushState(); if(S.playsLeft<=0)finishPlayerTurn(); else render(); }
  });
  if(won)return;
  if(!S.jsnChallenge){ if(S.playsLeft<=0)finishPlayerTurn(); else render(); }
}

function jsnReply(useIt){
  if(!S.jsnPrompt)return;
  const {onAccept,onBlock}=S.jsnPrompt;
  S.jsnPrompt=null;
  if(useIt){
    const jsnCard=S.playerHand.find(c=>c.subtype==='jsn');
    if(jsnCard){
      discardCard(jsnCard);
      S.playerHand=S.playerHand.filter(c=>c.id!==jsnCard.id);
      addLog('You played Just Say No! — action blocked!');
      if(onBlock)onBlock();
    }
  } else {
    addLog('You let the action through.');
    if(onAccept)onAccept();
  }
  _animIds.clear();
  render();
}

// Pause AI turn and offer player the chance to play JSN.
// If player has no JSN card, onAccept fires immediately with no prompt.
function promptJsn(description, onAccept, onBlock){
  if(_isMulti){ onAccept(); return; } // JSN not yet supported in multiplayer
  if(!S.playerHand.some(c=>c.subtype==='jsn')){
    onAccept();
    return;
  }
  S.jsnPrompt={description, onAccept, onBlock};
  render();
}

// AI decides whether to use JSN against a player action. Returns true if blocked.
function aiMayJsn(description, onProceed){
  if(_isMulti){
    // Send a JSN challenge to the opponent; pause until they respond
    _pendingJsnResolve = { onAccept: onProceed, onBlock: null };
    S.jsnChallenge = { description };
    pushState();
    return;
  }
  const jsnCard=S.aiHand.find(c=>c.subtype==='jsn');
  const willBlock=jsnCard&&(
    S.difficulty==='hard'||
    (S.difficulty==='medium'&&Math.random()<0.5)
  );
  if(willBlock){
    discardCard(jsnCard);
    S.aiHand=S.aiHand.filter(c=>c.id!==jsnCard.id);
    addLog(`AI played Just Say No! — your ${description} was blocked!`);
    return true;
  }
  onProceed();
  return false;
}

// ─── AI turn ──────────────────────────────────────────────────────────────────

function runAiTurn(){
  let hand=[...S.aiHand];
  let plays=0;

  function step(){
    // Capture current state at start of each step
    const {difficulty}=S;
    const curAS=S.aiSets, curAB=S.aiBank, curPS=S.playerSets, curPB=S.playerBank;

    if(plays>=3||hand.length===0){
      const drawn=drawFromDeck(2);
      hand=[...hand,...drawn];
      if(hand.length>7)hand=hand.slice(0,7);
      S.aiHand=hand; S.turn='player'; S.playsLeft=3;
      S.mustDraw=true; S.doubleActive=false; S.aiThinking=false;
      addLog('AI ended its turn. Draw 2 cards to start your turn.');
      render(); return;
    }

    let played=false;

    // Hard: Deal Breaker
    if(!played&&difficulty==='hard'){
      const db=hand.find(c=>c.subtype==='dealbreaker');
      if(db){
        const cc=Object.keys(curPS).find(c=>isComplete(curPS,c));
        if(cc){
          hand=hand.filter(c=>c.id!==db.id);
          S.aiHand=[...hand];
          addLog(`AI plays Deal Breaker on your complete ${COLORS[cc].label} set!`);
          plays++; played=true;
          _targetedIds=new Set((curPS[cc]||[]).map(c=>c.id));
          showPlayToast('AI', db, `DEAL BREAKER on your ${COLORS[cc].label} set!`);
          setTimeout(()=>{ _targetedIds.clear(); },1200);
          promptJsn(
            `AI is playing Deal Breaker on your complete ${COLORS[cc].label} set!`,
            ()=>{
              const stolen=S.playerSets[cc]||[];
              const newPS={...S.playerSets}; delete newPS[cc];
              S.aiSets={...S.aiSets,[cc]:stolen}; S.playerSets=newPS;
              // Transfer house/hotel with the set
              if(S.playerHouses[cc]){ S.aiHouses={...S.aiHouses,[cc]:true}; const h={...S.playerHouses}; delete h[cc]; S.playerHouses=h; }
              if(S.playerHotels[cc]){ S.aiHotels={...S.aiHotels,[cc]:true}; const h={...S.playerHotels}; delete h[cc]; S.playerHotels=h; }
              addLog(`AI stole your complete ${COLORS[cc].label} set with Deal Breaker!`);
              render();
              if(checkWin(S.aiSets,'ai'))return;
              setTimeout(step,900);
            },
            ()=>{ render(); setTimeout(step,900); }
          );
          return;
        }
      }
    }

    // Medium+: Double the Rent combo
    if(!played&&difficulty!=='easy'){
      const dtr=hand.find(c=>c.subtype==='doublerent');
      const rc=hand.find(c=>c.subtype==='rent'&&c!==dtr);
      if(dtr&&rc&&plays<=1){
        const vc=(rc.colors||[]).find(col=>(curAS[col]||[]).length>0);
        if(vc){
          hand=hand.filter(c=>c.id!==dtr.id);
          S.aiHand=[...hand];
          addLog('AI played Double the Rent!');
          plays++;
          showPlayToast('AI', dtr, 'Next rent is DOUBLED!');
          _animIds=new Set([dtr.id]); render(); _animIds.clear();
          setTimeout(()=>{
            discardCard(rc);
            hand=hand.filter(c=>c.id!==rc.id);
            const amt=calcRent(S.aiSets,vc,true,S.aiHouses,S.aiHotels);
            S.aiHand=[...hand];
            addLog(`AI charges DOUBLE rent for ${COLORS[vc].label}: $${amt}M!`);
            showPlayToast('AI', rc, `DOUBLE rent $${amt}M for ${COLORS[vc].label}!`);
            plays++;
            promptJsn(
              `AI is charging DOUBLE rent ($${amt}M) for ${COLORS[vc].label}!`,
              ()=>{
                const {newBank,newSets,paid}=payRent(amt,S.playerBank,S.playerSets);
                S.playerBank=newBank; S.playerSets=newSets;
                const r=applyPayment(paid,S.aiBank,S.aiSets);
                S.aiBank=r.newBank; S.aiSets=r.newSets;
                render(); setTimeout(step,900);
              },
              ()=>{ render(); setTimeout(step,900); }
            );
          },800);
          return;
        }
      }
    }

    // Hard+Medium: Sly Deal
    if(!played&&(difficulty==='hard'||(difficulty==='medium'&&Math.random()<0.5))){
      const sd=hand.find(c=>c.subtype==='slydeal');
      if(sd){
        const sc=Object.keys(curPS).find(c=>(curPS[c]||[]).length>0&&!isComplete(curPS,c));
        if(sc){
          discardCard(sd);
          hand=hand.filter(c=>c.id!==sd.id);
          const cc2=curPS[sc];
          const stolen=cc2[cc2.length-1];
          S.aiHand=[...hand];
          addLog(`AI plays Sly Deal targeting your ${stolen.name}!`);
          plays++; played=true;
          _targetedIds=new Set([stolen.id]);
          showPlayToast('AI', sd, `Stealing your ${stolen.name}!`);
          setTimeout(()=>{ _targetedIds.clear(); },1200);
          promptJsn(
            `AI is playing Sly Deal to steal your ${stolen.name}!`,
            ()=>{
              const newPS={...S.playerSets,[sc]:S.playerSets[sc].slice(0,-1)};
              S.aiSets={...S.aiSets,[stolen.color]:[...(S.aiSets[stolen.color]||[]),stolen]};
              S.playerSets=newPS;
              addLog(`AI stole your ${stolen.name} with Sly Deal!`);
              render();
              if(checkWin(S.aiSets,'ai'))return;
              setTimeout(step,900);
            },
            ()=>{ render(); setTimeout(step,900); }
          );
          return;
        }
      }
    }

    // Medium+: Forced Deal — give a low-value card, take a high-value one from incomplete sets
    if(!played&&difficulty!=='easy'){
      const fd=hand.find(c=>c.subtype==='forceddeal');
      if(fd){
        // Find best player card to take (highest value from incomplete set)
        const takeColor=Object.keys(curPS)
          .filter(c=>(curPS[c]||[]).length>0&&!isComplete(curPS,c))
          .sort((a,b)=>{
            const aCard=curPS[a][curPS[a].length-1];
            const bCard=curPS[b][curPS[b].length-1];
            return bCard.value-aCard.value;
          })[0];
        // Find least valuable AI card to give (from a color furthest from completing)
        const giveColor=Object.keys(curAS)
          .filter(c=>(curAS[c]||[]).length>0)
          .sort((a,b)=>{
            const aLeft=COLORS[a].size-(curAS[a]||[]).length;
            const bLeft=COLORS[b].size-(curAS[b]||[]).length;
            return bLeft-aLeft;
          })[0];
        if(takeColor&&giveColor){
          const takeCard=curPS[takeColor][curPS[takeColor].length-1];
          const giveCard=curAS[giveColor][curAS[giveColor].length-1];
          discardCard(fd);
          hand=hand.filter(c=>c.id!==fd.id);
          S.aiHand=[...hand];
          addLog(`AI plays Forced Deal: giving ${giveCard.name}, taking your ${takeCard.name}!`);
          plays++; played=true;
          _targetedIds=new Set([takeCard.id]);
          showPlayToast('AI', fd, `Swapping for your ${takeCard.name}!`);
          setTimeout(()=>{ _targetedIds.clear(); },1200);
          promptJsn(
            `AI is playing Forced Deal — swapping its ${giveCard.name} for your ${takeCard.name}!`,
            ()=>{
              // Remove giveCard from AI sets, add to player sets
              const newAS=JSON.parse(JSON.stringify(S.aiSets));
              newAS[giveColor]=newAS[giveColor].filter(c=>c.id!==giveCard.id);
              if(!newAS[giveColor].length) delete newAS[giveColor];
              if(!newAS[takeCard.color])newAS[takeCard.color]=[];
              newAS[takeCard.color].push(takeCard);
              // Remove takeCard from player sets, add giveCard
              const newPS=JSON.parse(JSON.stringify(S.playerSets));
              newPS[takeColor]=newPS[takeColor].filter(c=>c.id!==takeCard.id);
              if(!newPS[takeColor].length) delete newPS[takeColor];
              if(!newPS[giveCard.color])newPS[giveCard.color]=[];
              newPS[giveCard.color].push(giveCard);
              S.aiSets=newAS; S.playerSets=newPS;
              addLog(`Forced Deal complete! AI has ${takeCard.name}, you have ${giveCard.name}.`);
              render();
              if(checkWin(newAS,'ai'))return;
              setTimeout(step,900);
            },
            ()=>{ render(); setTimeout(step,900); }
          );
          return;
        }
      }
    }

    // All: play properties (prioritise completing sets)
    if(!played){
      const props=hand.filter(c=>c.type==='property');
      if(props.length>0){
        const sorted=[...props].sort((a,b)=>{
          const aL=COLORS[a.color].size-(curAS[a.color]||[]).length;
          const bL=COLORS[b.color].size-(curAS[b.color]||[]).length;
          return aL-bL;
        });
        const card=sorted[0];
        hand=hand.filter(c=>c.id!==card.id);
        S.aiHand=[...hand];
        addLog(`AI played ${card.name} to ${COLORS[card.color].label}.`);
        plays++; played=true;
        showPlayToast('AI', card, `→ ${COLORS[card.color].label}`);
        render();
        setTimeout(()=>{
          const ns={...S.aiSets,[card.color]:[...(S.aiSets[card.color]||[]),card]};
          S.aiSets=ns;
          _animIds=new Set([card.id]); render(); _animIds.clear();
          if(checkWin(ns,'ai'))return;
          setTimeout(step,450);
        },450); return;
      }
    }

    // Medium+: Place House on complete set
    if(!played&&difficulty!=='easy'){
      const houseCard=hand.find(c=>c.subtype==='house');
      if(houseCard){
        const targetColor=Object.keys(curAS).find(c=>isComplete(curAS,c)&&!S.aiHouses[c]);
        if(targetColor){
          discardCard(houseCard);
          hand=hand.filter(c=>c.id!==houseCard.id);
          S.aiHand=[...hand];
          S.aiHouses={...S.aiHouses,[targetColor]:true};
          addLog(`AI placed a House on their ${COLORS[targetColor].label} set! (+$3M rent)`);
          plays++; played=true;
          showPlayToast('AI', houseCard, `House on ${COLORS[targetColor].label} (+$3M)`);
          render(); setTimeout(step,900); return;
        }
      }
    }

    // Medium+: Place Hotel on complete set with a house
    if(!played&&difficulty!=='easy'){
      const hotelCard=hand.find(c=>c.subtype==='hotel');
      if(hotelCard){
        const targetColor=Object.keys(curAS).find(c=>isComplete(curAS,c)&&S.aiHouses[c]&&!S.aiHotels[c]);
        if(targetColor){
          discardCard(hotelCard);
          hand=hand.filter(c=>c.id!==hotelCard.id);
          S.aiHand=[...hand];
          S.aiHotels={...S.aiHotels,[targetColor]:true};
          addLog(`AI placed a Hotel on their ${COLORS[targetColor].label} set! (+$4M rent)`);
          plays++; played=true;
          showPlayToast('AI', hotelCard, `Hotel on ${COLORS[targetColor].label} (+$4M)`);
          render(); setTimeout(step,900); return;
        }
      }
    }

    // Medium+: Pass Go
    if(!played&&difficulty!=='easy'){
      const pg=hand.find(c=>c.subtype==='passgo');
      if(pg){
        discardCard(pg);
        hand=hand.filter(c=>c.id!==pg.id);
        const drawn=drawFromDeck(2);
        hand=[...hand,...drawn]; S.aiHand=[...hand];
        addLog('AI played Pass Go and drew 2 cards.');
        plays++; played=true;
        showPlayToast('AI', pg, 'Draw 2 cards');
        _animIds=new Set(drawn.map(c=>c.id)); render(); _animIds.clear();
        setTimeout(step,900); return;
      }
    }

    // Medium+: Charge rent
    if(!played&&difficulty!=='easy'){
      const rc=hand.find(c=>c.subtype==='rent');
      if(rc){
        const vc=(rc.colors||[]).filter(col=>(curAS[col]||[]).length>0)
          .sort((a,b)=>calcRent(curAS,b,false,S.aiHouses,S.aiHotels)-calcRent(curAS,a,false,S.aiHouses,S.aiHotels))[0];
        if(vc){
          const amt=calcRent(curAS,vc,false,S.aiHouses,S.aiHotels);
          if(amt>0){
            discardCard(rc);
            hand=hand.filter(c=>c.id!==rc.id); S.aiHand=[...hand];
            addLog(`AI charges rent for ${COLORS[vc].label}: $${amt}M!`);
            showPlayToast('AI', rc, `$${amt}M rent for ${COLORS[vc].label}`);
            plays++; played=true;
            promptJsn(
              `AI is charging $${amt}M rent for ${COLORS[vc].label}!`,
              ()=>{
                const {newBank,newSets,paid}=payRent(amt,S.playerBank,S.playerSets);
                S.playerBank=newBank; S.playerSets=newSets;
                const r=applyPayment(paid,S.aiBank,S.aiSets);
                S.aiBank=r.newBank; S.aiSets=r.newSets;
                render(); setTimeout(step,900);
              },
              ()=>{ render(); setTimeout(step,900); }
            );
            return;
          }
        }
      }
    }

    // Hard: Birthday / Debt Collector
    if(!played&&difficulty==='hard'){
      const bday=hand.find(c=>c.subtype==='birthday');
      if(bday){
        hand=hand.filter(c=>c.id!==bday.id); S.aiHand=[...hand];
        const amt=bday.amount||2;
        addLog(`AI played It's My Birthday! You owe $${amt}M.`);
        showPlayToast('AI', bday, `Pay $${amt}M!`);
        plays++; played=true;
        promptJsn(
          `AI played It's My Birthday — you owe $${amt}M!`,
          ()=>{
            const {newBank,newSets,paid}=payRent(amt,S.playerBank,S.playerSets);
            S.playerBank=newBank; S.playerSets=newSets;
            const r=applyPayment(paid,S.aiBank,S.aiSets);
            S.aiBank=r.newBank; S.aiSets=r.newSets;
            render(); setTimeout(step,900);
          },
          ()=>{ render(); setTimeout(step,900); }
        );
        return;
      }
      const dc=hand.find(c=>c.subtype==='debtcollector');
      if(dc){
        hand=hand.filter(c=>c.id!==dc.id); S.aiHand=[...hand];
        const amt=dc.amount||5;
        addLog(`AI played Debt Collector! You owe $${amt}M.`);
        showPlayToast('AI', dc, `Pay $${amt}M!`);
        plays++; played=true;
        promptJsn(
          `AI played Debt Collector — you owe $${amt}M!`,
          ()=>{
            const {newBank,newSets,paid}=payRent(amt,S.playerBank,S.playerSets);
            S.playerBank=newBank; S.playerSets=newSets;
            const r=applyPayment(paid,S.aiBank,S.aiSets);
            S.aiBank=r.newBank; S.aiSets=r.newSets;
            render(); setTimeout(step,900);
          },
          ()=>{ render(); setTimeout(step,900); }
        );
        return;
      }
    }

    // Easy: Pass Go only
    if(!played&&difficulty==='easy'){
      const pg=hand.find(c=>c.subtype==='passgo');
      if(pg){
        discardCard(pg);
        hand=hand.filter(c=>c.id!==pg.id);
        const drawn=drawFromDeck(2);
        hand=[...hand,...drawn]; S.aiHand=[...hand];
        addLog('AI played Pass Go and drew 2 cards.');
        plays++; played=true;
        showPlayToast('AI', pg, 'Draw 2 cards');
        _animIds=new Set(drawn.map(c=>c.id)); render(); _animIds.clear();
        setTimeout(step,900); return;
      }
    }

    // Fallback: bank something
    if(!played){
      const bankable=hand.find(c=>c.type==='money'
        ||(c.type==='action'&&!['jsn','dealbreaker','slydeal','forceddeal','doublerent'].includes(c.subtype)));
      const toBank=bankable||(hand.length>0?hand[0]:null);
      if(toBank){
        hand=hand.filter(c=>c.id!==toBank.id);
        S.aiBank=[...S.aiBank,toBank]; S.aiHand=[...hand];
        addLog(`AI banked ${toBank.name}.`);
        plays++;
        showPlayToast('AI', toBank, 'Banked');
        _animIds=new Set([toBank.id]); render(); _animIds.clear();
        setTimeout(step,900); return;
      }
    }

    plays=3; step();
  }

  step();
}

// ─── Multiplayer ─────────────────────────────────────────────────────────────

let _joinDraft         = '';
let _roomId            = null;
let _myRole            = 'player';   // 'player' = host, 'ai' = guest
let _isMulti           = false;
let _lastVer           = 0;
let _peer              = null;
let _conn              = null;
let _pendingJsnResolve = null;  // {onAccept, onBlock} while waiting for remote JSN response

// ── Perspective swap (swaps player ↔ ai fields in-place) ──────────────────
// Guest always works locally with player=themselves; swap happens at the
// network boundary so Firebase always stores host=player, guest=ai.

function swapPerspective(st) {
  [st.playerHand,  st.aiHand]    = [st.aiHand,    st.playerHand];
  [st.playerBank,  st.aiBank]    = [st.aiBank,     st.playerBank];
  [st.playerSets,  st.aiSets]    = [st.aiSets,     st.playerSets];
  [st.playerHouses,st.aiHouses]  = [st.aiHouses,   st.playerHouses];
  [st.playerHotels,st.aiHotels]  = [st.aiHotels,   st.playerHotels];
  st.turn = st.turn === 'player' ? 'ai' : 'player';
  if (st.gameOver) st.gameOver = st.gameOver === 'player' ? 'ai' : 'player';
}

// ── State sync ──────────────────────────────────────────────────────────────

function buildNetState() {
  const snap = JSON.parse(JSON.stringify({
    deck:S.deck, discard:S.discard,
    playerHand:S.playerHand, aiHand:S.aiHand,
    playerBank:S.playerBank, aiBank:S.aiBank,
    playerSets:S.playerSets, aiSets:S.aiSets,
    playerHouses:S.playerHouses, playerHotels:S.playerHotels,
    aiHouses:S.aiHouses, aiHotels:S.aiHotels,
    turn:S.turn, playsLeft:S.playsLeft, mustDraw:S.mustDraw,
    doubleActive:S.doubleActive, discardMode:S.discardMode,
    discardSelected:S.discardSelected, pendingAction:S.pendingAction,
    log:S.log, gameOver:S.gameOver, screen:S.screen,
    difficulty:S.difficulty, version:_lastVer + 1,
    jsnChallenge:S.jsnChallenge || null,
    lastAction:S.lastAction || null,
  }));
  if (_myRole === 'ai') swapPerspective(snap);
  return snap;
}

function pushState() {
  if (!_isMulti || !_conn) return;
  const snap = buildNetState();
  _lastVer = snap.version;
  try { _conn.send(snap); } catch(e) { console.warn('send error:', e); }
  S.lastAction = null;
}

function applyRemoteState(data) {
  if (!data || typeof data.version !== 'number') return;
  if (data.version <= _lastVer) return;
  _lastVer = data.version;
  const snap = JSON.parse(JSON.stringify(data));
  if (_myRole === 'ai') swapPerspective(snap);
  const keep = { difficulty:S.difficulty, screen:'game',
                 aiThinking:false, jsnPrompt:null, selected:null,
                 multiLobby:null };
  Object.assign(S, snap, keep);
  S.jsnChallenge = null;  // challenge is resolved locally via jsnPrompt, not kept in S

  // Show toast for opponent's most recent action
  if (snap.lastAction) {
    showPlayToast('Opponent', snap.lastAction.card, snap.lastAction.desc);
  }

  // If opponent is challenging us with a JSN-able action, set up the local prompt
  if (snap.jsnChallenge) {
    const jsnCard = S.playerHand.find(c => c.subtype === 'jsn');
    if (!jsnCard) {
      // No JSN card — auto-accept
      try { _conn.send({ type:'jsnResponse', action:'accept' }); } catch(e) {}
    } else {
      S.jsnPrompt = {
        description: snap.jsnChallenge.description,
        onAccept: () => {
          try { _conn.send({ type:'jsnResponse', action:'accept' }); } catch(e) {}
          render();
        },
        onBlock: () => {
          // jsnReply already removed the card from hand; just send the response
          try { _conn.send({ type:'jsnResponse', action:'block', jsnCard }); } catch(e) {}
          render();
        },
      };
    }
  }

  render();
}

function stopPoll() {} // no-op kept so goMenu() still works

// ── Room management ─────────────────────────────────────────────────────────

function wireConn(conn) {
  _conn = conn;
  conn.on('data', data => {
    if (data?.type === 'ready' && _myRole === 'player') {
      S.multiLobby = null; initGame(); return;
    }
    if (data?.type === 'jsnResponse') {
      const resolve = _pendingJsnResolve;
      _pendingJsnResolve = null;
      S.jsnChallenge = null;
      if (data.action === 'block') {
        // Remove JSN card from opponent's hand (ai's hand from our perspective)
        const jsnIdx = S.aiHand.findIndex(c => c.subtype === 'jsn');
        if (jsnIdx !== -1) { discardCard(S.aiHand[jsnIdx]); S.aiHand.splice(jsnIdx, 1); }
        addLog('Opponent blocked with Just Say No!');
        if (data.jsnCard) showPlayToast('Opponent', data.jsnCard, 'Just Say No! — Blocked!');
        render();
      } else {
        if (resolve?.onAccept) resolve.onAccept();
      }
      return;
    }
    applyRemoteState(data);
  });
  conn.on('error', e    => console.warn('connection error:', e));
  conn.on('close', ()   => {
    if (_isMulti) { addLog('Opponent disconnected.'); _conn = null; render(); }
  });
}

function createRoom() {
  const code = Math.random().toString(36).slice(2,6).toUpperCase();
  _roomId  = 'md-' + code.toLowerCase();
  _myRole  = 'player';
  _isMulti = true;
  _lastVer = 0;

  if (_peer) { _peer.destroy(); }
  _peer = new Peer(_roomId);

  _peer.on('error', e => {
    if (e.type === 'unavailable-id') {
      // ID taken — try fully random
      _peer.destroy();
      _peer = new Peer();
      _peer.on('open', () => {
        S.multiLobby = { state:'waiting', roomId: _peer.id };
        render();
      });
      _peer.on('connection', conn => { wireConn(conn); }); // initGame fires when guest sends {type:'ready'}
    } else { alert('Connection error: ' + e.message); }
  });

  _peer.on('open', () => {
    S.multiLobby = { state:'waiting', roomId: code };
    render();
  });

  _peer.on('connection', conn => {
    wireConn(conn); // initGame fires when guest sends {type:'ready'}
  });
}

function joinRoom() {
  const code = _joinDraft.trim().toUpperCase();
  if (!code) { alert('Enter a room code.'); return; }
  _roomId  = 'md-' + code.toLowerCase();
  _myRole  = 'ai';
  _isMulti = true;
  _lastVer = 0;

  if (_peer) { _peer.destroy(); }
  _peer = new Peer();

  _peer.on('open', () => {
    const conn = _peer.connect(_roomId, { reliable:true });
    wireConn(conn);
    conn.on('open', () => {
      if (S.multiLobby) { S.multiLobby = { state:'joined', roomId: code }; render(); }
      conn.send({ type: 'ready' });
    });
    conn.on('error', () => {
      alert(`Room "${code}" not found — check the code and try again.`);
      cancelMulti();
    });
  });

  _peer.on('error', e => { alert('Could not connect: ' + e.message); cancelMulti(); });
}

function cancelMulti() {
  if (_conn)  { _conn.close();     _conn  = null; }
  if (_peer)  { _peer.destroy();   _peer  = null; }
  _isMulti = false; _roomId = null; _myRole = 'player'; _lastVer = 0;
  S.multiLobby = null; S.screen = 'menu';
  render();
}

// ── Lobby screen ─────────────────────────────────────────────────────────────

function lobbyHTML() {
  const {state, roomId} = S.multiLobby;
  const dots = `<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  const body = state === 'waiting'
    ? `<div style="font-size:52px;font-weight:900;letter-spacing:12px;color:#ffd740;text-align:center;padding:8px 0">${roomId}</div>
       <div style="color:#a5d6a7;font-size:13px;text-align:center">Share this code with your opponent</div>
       <div style="display:flex;gap:8px;align-items:center;color:#ef9a9a;font-size:12px">${dots} Waiting for opponent to join...</div>`
    : `<div style="font-size:28px;font-weight:900;color:#ffd740">Joined Room <span style="letter-spacing:4px">${roomId}</span></div>
       <div style="display:flex;gap:8px;align-items:center;color:#a5d6a7;font-size:12px">${dots} Waiting for host to start the game...</div>`;
  return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:18px;padding:24px">
    <div style="font-size:42px">🎴</div>
    <div style="font-size:22px;font-weight:900;color:#fff">Monopoly Deal</div>
    ${body}
    <button class="btn sec" style="margin-top:8px" onclick="cancelMulti()">Cancel</button>
  </div>`;
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
render();
</script>
<div id="play-toast"></div>
</body>
